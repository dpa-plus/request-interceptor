<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Request Interceptor hero banner</title>
  <desc id="desc">A premium dark banner with traffic streams flowing through a glowing proxy node into an observability dashboard.</desc>
  <defs>
    <radialGradient id="heroGlowBlue" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(710 160) rotate(124) scale(420 520)">
      <stop stop-color="#58A6FF" stop-opacity="0.46"/>
      <stop offset="0.42" stop-color="#1F6FEB" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#0D1117" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="heroGlowOrange" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(244 76) rotate(38) scale(360 280)">
      <stop stop-color="#FF7A1A" stop-opacity="0.36"/>
      <stop offset="0.48" stop-color="#FF6100" stop-opacity="0.11"/>
      <stop offset="1" stop-color="#0D1117" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="heroBg" x1="0" y1="0" x2="1200" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#05070C"/>
      <stop offset="0.48" stop-color="#0D1117"/>
      <stop offset="1" stop-color="#101827"/>
    </linearGradient>
    <linearGradient id="heroRail" x1="90" y1="194" x2="1065" y2="194" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FF6100"/>
      <stop offset="0.35" stop-color="#58A6FF"/>
      <stop offset="0.72" stop-color="#A371F7"/>
      <stop offset="1" stop-color="#3FB950"/>
    </linearGradient>
    <linearGradient id="heroPanel" x1="720" y1="74" x2="1078" y2="308" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1B2433"/>
      <stop offset="1" stop-color="#0D1117"/>
    </linearGradient>
    <pattern id="heroGrid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M42 0H0V42" stroke="#8B949E" stroke-opacity="0.11"/>
    </pattern>
    <filter id="heroShadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="22" stdDeviation="28" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <filter id="heroSoftGlow" x="-60%" y="-60%" width="220%" height="220%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="13" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.35 0 0 0 0 0.65 0 0 0 0 1 0 0 0 0.85 0"/>
      <feBlend in="SourceGraphic"/>
    </filter>
    <clipPath id="heroClip">
      <rect width="1200" height="360" rx="30"/>
    </clipPath>
  </defs>

  <g clip-path="url(#heroClip)">
    <rect width="1200" height="360" fill="url(#heroBg)"/>
    <rect width="1200" height="360" fill="url(#heroGrid)" opacity="0.8"/>
    <rect width="1200" height="360" fill="url(#heroGlowBlue)"/>
    <rect width="1200" height="360" fill="url(#heroGlowOrange)"/>
    <path d="M-40 304C140 228 234 332 404 270C556 215 601 78 780 78C920 78 1006 150 1240 78" stroke="#58A6FF" stroke-opacity="0.16" stroke-width="2"/>
    <path d="M-36 80C142 156 286 34 450 92C600 145 658 273 832 250C958 233 1055 192 1236 226" stroke="#FF6100" stroke-opacity="0.13" stroke-width="2"/>
    <path d="M86 244C180 207 280 196 400 204C505 211 560 231 630 220C760 199 870 138 1062 137" stroke="url(#heroRail)" stroke-width="6" stroke-linecap="round"/>
    <path d="M102 274C260 236 398 256 560 236C704 214 818 202 1058 226" stroke="url(#heroRail)" stroke-width="3" stroke-linecap="round" stroke-opacity="0.42"/>

    <g transform="translate(74 66)">
      <text x="0" y="30" fill="#FFB088" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" font-weight="800">MITM PROXY</text>
      <text x="0" y="86" fill="#F0F6FC" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="48" font-weight="850">Request Interceptor</text>
      <text x="2" y="122" fill="#9BA7B4" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="18">AI traffic, decoded live.</text>

      <g transform="translate(0 174)">
        <rect width="126" height="34" rx="17" fill="#10141E" stroke="#FF6100" stroke-opacity="0.58"/>
        <text x="22" y="22" fill="#FFB088" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" font-weight="800">drop-in</text>
        <rect x="140" width="126" height="34" rx="17" fill="#10141E" stroke="#58A6FF" stroke-opacity="0.56"/>
        <text x="160" y="22" fill="#9ECBFF" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" font-weight="800">streaming</text>
        <rect x="280" width="126" height="34" rx="17" fill="#10141E" stroke="#3FB950" stroke-opacity="0.54"/>
        <text x="309" y="22" fill="#7EE787" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" font-weight="800">+30ms</text>
      </g>
    </g>

    <circle cx="630" cy="220" r="58" fill="#0D1117" stroke="#30363D" stroke-width="1.5" filter="url(#heroShadow)"/>
    <circle cx="630" cy="220" r="36" fill="#1F6FEB" fill-opacity="0.16" stroke="#58A6FF" stroke-opacity="0.7"/>
    <circle cx="630" cy="220" r="10" fill="#58A6FF" filter="url(#heroSoftGlow)"/>
    <path d="M606 220h48M630 196v48" stroke="#9ECBFF" stroke-width="3" stroke-linecap="round" opacity="0.75"/>

    <g filter="url(#heroShadow)">
      <rect x="735" y="70" width="392" height="244" rx="24" fill="url(#heroPanel)" stroke="#30363D"/>
      <rect x="762" y="96" width="338" height="38" rx="12" fill="#0D1117" stroke="#30363D"/>
      <circle cx="786" cy="115" r="7" fill="#3FB950"/>
      <path d="M808 115H922" stroke="#C9D1D9" stroke-width="8" stroke-linecap="round" opacity="0.76"/>
      <path d="M990 115H1066" stroke="#58A6FF" stroke-width="8" stroke-linecap="round" opacity="0.7"/>

      <g transform="translate(762 158)">
        <rect width="338" height="38" rx="12" fill="#161B22" stroke="#30363D"/>
        <rect x="16" y="11" width="52" height="16" rx="8" fill="#1F6FEB" fill-opacity="0.3"/>
        <path d="M88 19H216" stroke="#C9D1D9" stroke-width="7" stroke-linecap="round" opacity="0.72"/>
        <path d="M258 19H310" stroke="#7EE787" stroke-width="7" stroke-linecap="round" opacity="0.8"/>
      </g>
      <g transform="translate(762 208)">
        <rect width="338" height="38" rx="12" fill="#161B22" stroke="#30363D"/>
        <rect x="16" y="11" width="52" height="16" rx="8" fill="#8957E5" fill-opacity="0.3"/>
        <path d="M88 19H188" stroke="#C9D1D9" stroke-width="7" stroke-linecap="round" opacity="0.72"/>
        <path d="M244 19H310" stroke="#D2A8FF" stroke-width="7" stroke-linecap="round" opacity="0.8"/>
      </g>
      <g transform="translate(762 258)">
        <path d="M0 0H70" stroke="#3FB950" stroke-width="7" stroke-linecap="round"/>
        <path d="M88 0H184" stroke="#58A6FF" stroke-width="7" stroke-linecap="round"/>
        <path d="M202 0H286" stroke="#FF6100" stroke-width="7" stroke-linecap="round"/>
      </g>
    </g>
  </g>
</svg>
